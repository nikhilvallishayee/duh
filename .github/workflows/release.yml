name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────
  # Gate 1: Full test suite must pass
  # ──────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout pytest-cov textual hypothesis

      - name: Run full test suite with coverage
        env:
          DUH_STUB_PROVIDER: "1"
        run: |
          pytest tests/ -q --tb=short \
            --timeout=30 --timeout-method=thread \
            --cov=duh --cov-report=term \
            --cov-fail-under=85

  # ──────────────────────────────────────────────────
  # Gate 2: Security scan must pass (no high/critical)
  # ──────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install D.U.H.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run duh security scan
        run: |
          python -m duh security scan \
            --sarif-out release-security.sarif \
            --fail-on=high

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@7fc1baf373eb073c686865bd453d412d506a05a2 # v3.35.1
        with:
          sarif_file: release-security.sarif
          category: duh-release-security

  # ──────────────────────────────────────────────────
  # Gate 3: Taint strict mode (ADR-054 defense)
  # ──────────────────────────────────────────────────
  taint-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install D.U.H.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout hypothesis

      - name: Run tests with DUH_TAINT_STRICT=1
        env:
          DUH_TAINT_STRICT: "1"
          DUH_STUB_PROVIDER: "1"
        run: |
          pytest tests/unit/ -q --tb=short \
            --timeout=30 --timeout-method=thread

  # ──────────────────────────────────────────────────
  # Build: Only after all gates pass
  # ──────────────────────────────────────────────────
  build:
    needs: [test, security, taint-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

  # ──────────────────────────────────────────────────
  # Publish: PyPI via Trusted Publishing (OIDC)
  # ──────────────────────────────────────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Trusted Publishing (OIDC) — PEP 740 attestations
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@6733eb7d741f0b11ec6a39b58540dab7590f9b7d # v1.14.0
        with:
          attestations: true

  # ──────────────────────────────────────────────────
  # GitHub Release with notes
  # ──────────────────────────────────────────────────
  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download artifacts
        uses: actions/download-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
