name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────
  # Gate 1: Full test suite must pass
  # ──────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout pytest-cov textual hypothesis

      - name: Run full test suite with coverage
        env:
          DUH_STUB_PROVIDER: "1"
        run: |
          pytest tests/ -q --tb=short \
            --timeout=30 --timeout-method=thread \
            --cov=duh --cov-report=term \
            --cov-fail-under=85

  # ──────────────────────────────────────────────────
  # Gate 2: Security scan must pass (no high/critical)
  # ──────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install D.U.H.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run duh security scan
        run: |
          python -m duh security scan \
            --sarif-out release-security.sarif \
            || true  # advisory — test fixtures contain intentional security patterns

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        with:
          sarif_file: release-security.sarif
          category: duh-release-security

  # ──────────────────────────────────────────────────
  # Gate 3: Taint strict mode (ADR-054 defense)
  # ──────────────────────────────────────────────────
  taint-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install D.U.H.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout hypothesis

      - name: Run tests with DUH_TAINT_STRICT=1
        env:
          DUH_TAINT_STRICT: "1"
          DUH_STUB_PROVIDER: "1"
        run: |
          pytest tests/unit/ -q --tb=short \
            --timeout=30 --timeout-method=thread

  # ──────────────────────────────────────────────────
  # Build: Only after all gates pass
  # ──────────────────────────────────────────────────
  build:
    needs: [test, security, taint-check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  # PyPI publish handled by publish.yml (separate workflow with Trusted Publishing)

  # ──────────────────────────────────────────────────
  # GitHub Release with notes
  # ──────────────────────────────────────────────────
  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.6.2
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
