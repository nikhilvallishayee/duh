name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.12"]
    # Note: DUH_STUB_PROVIDER lands with PR #2. Until then integration
    # tests skip when no provider is configured.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/unit -q --tb=short \
            --timeout=30 --timeout-method=thread

      - name: Run integration tests
        run: |
          pytest tests/integration -q --tb=short \
            --timeout=60 --timeout-method=thread

      - name: Coverage report
        run: |
          pytest tests/ -q --tb=no \
            --timeout=30 --timeout-method=thread \
            --cov=duh --cov-report=term --cov-report=xml \
            --cov-fail-under=85

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
