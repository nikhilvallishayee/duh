name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache pip
        uses: actions/cache@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.2.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-timeout pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/unit -q --tb=short \
            --timeout=30 --timeout-method=thread

      - name: Run integration tests
        run: |
          pytest tests/integration -q --tb=short \
            --timeout=60 --timeout-method=thread

      - name: Coverage report
        run: |
          pytest tests/ -q --tb=no \
            --timeout=30 --timeout-method=thread \
            --cov=duh --cov-report=term --cov-report=xml \
            --cov-fail-under=100

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  security:
    name: Security (duh + dependency-review + zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install D.U.H. with security extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

      - name: Run duh security scan (SARIF)
        run: |
          python -m duh security scan \
            --sarif-out security.sarif \
            --fail-on=high

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: duh-security-sarif
          path: security.sarif
          if-no-files-found: warn

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        with:
          sarif_file: security.sarif
          category: duh-security
