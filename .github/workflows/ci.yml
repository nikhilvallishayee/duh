name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install tmux (required for Tier C TUI E2E tests)
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tui-e2e]"
          pip install pytest-timeout pytest-cov

      - name: Run unit tests
        env:
          DUH_STUB_PROVIDER: "1"
        run: |
          pytest tests/unit -q --tb=short \
            --timeout=30 --timeout-method=thread

      - name: Run integration tests (incl. Tier B PTY + Tier C tmux)
        env:
          DUH_STUB_PROVIDER: "1"
        run: |
          pytest tests/integration -q --tb=short \
            --timeout=120 --timeout-method=thread

      - name: Run snapshot tests (Tier A)
        env:
          DUH_STUB_PROVIDER: "1"
        run: |
          pytest tests/snapshots -q --tb=short \
            --timeout=60 --timeout-method=thread

      - name: Coverage report
        env:
          DUH_STUB_PROVIDER: "1"
        run: |
          pytest tests/ -q --tb=no \
            --timeout=60 --timeout-method=thread \
            --cov=duh --cov-report=term --cov-report=xml \
            --cov-fail-under=85

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  security:
    name: Security (duh + dependency-review + zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install D.U.H. with security extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Dependency review
        if: github.event_name == 'pull_request'
        continue-on-error: true  # advisory — requires dependency graph enabled in repo settings
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

      - name: Run duh security scan (SARIF)
        run: |
          python -m duh security scan \
            --sarif-out security.sarif \
            --project-root duh/ \
            || true  # advisory — test fixtures contain intentional CVE patterns

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: duh-security-sarif
          path: security.sarif
          if-no-files-found: warn

      - name: Upload SARIF to code scanning
        if: always() && hashFiles('security.sarif') != ''
        continue-on-error: true  # advisory — code scanning may not be enabled
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        with:
          sarif_file: security.sarif
          category: duh-security
