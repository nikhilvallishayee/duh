[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "duh-cli"
dynamic = ["version"]
description = "D.U.H. — Duh is a Universal Harness. Provider-agnostic AI coding agent."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.12"
authors = [
    { name = "Nikhil Vallishayee" },
]
keywords = ["ai", "coding", "agent", "harness", "mcp", "cli"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development",
]
dependencies = [
    "anthropic>=0.40.0",
    "httpx>=0.27.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
openai = ["openai>=1.0"]
rich = ["rich>=13.0"]
dev = ["pytest", "pytest-asyncio", "pytest-cov", "openai>=1.0", "rich>=13.0"]

[project.scripts]
duh = "duh.cli.main:main"

[tool.hatch.version]
path = "duh/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["duh"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "integration: marks tests that talk to real external services",
    "slow: marks tests that may take more than a few seconds",
]
